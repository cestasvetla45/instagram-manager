# Railway config for the WEB service (Next.js).
# Create a SECOND Railway service from the same repo for the worker and set its
# start command to:  npm run worker   (see README "Railway" section).

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm run start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
