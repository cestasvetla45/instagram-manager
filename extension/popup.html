<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { font: 13px/1.45 -apple-system, system-ui, sans-serif; width: 300px; margin: 0; padding: 14px; background: #111; color: #eee; }
      h1 { font-size: 14px; margin: 0 0 10px; }
      label { display: block; margin: 8px 0 3px; color: #aaa; font-size: 12px; }
      input[type="text"], input[type="password"] { width: 100%; box-sizing: border-box; padding: 6px 8px; border-radius: 6px; border: 1px solid #333; background: #1c1c1c; color: #eee; }
      .row { display: flex; gap: 8px; margin-top: 12px; }
      button { flex: 1; padding: 6px 0; border-radius: 6px; border: 0; background: #4f46e5; color: #fff; cursor: pointer; }
      button.secondary { background: #333; }
      .toggle { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
      .stats { margin-top: 12px; padding: 8px 10px; background: #1c1c1c; border-radius: 8px; font-size: 12px; color: #bbb; }
      .ok { color: #4ade80; } .err { color: #f87171; }
      #msg { margin-top: 8px; font-size: 12px; min-height: 15px; }
    </style>
  </head>
  <body>
    <h1>Reel Lab — discovery connector</h1>
    <label>App URL</label>
    <input type="text" id="appUrl" placeholder="https://instagram-tool-production-e4f2.up.railway.app" />
    <label>Ingest secret</label>
    <input type="password" id="secret" placeholder="INGEST_SECRET value" />
    <div class="toggle">
      <input type="checkbox" id="enabled" />
      <span>Capture while browsing Instagram</span>
    </div>
    <div class="row">
      <button id="save">Save</button>
      <button id="test" class="secondary">Test</button>
    </div>
    <div id="msg"></div>
    <div class="stats" id="stats">No activity yet.</div>
    <script src="popup.js"></script>
  </body>
</html>
